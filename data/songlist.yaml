intro: We've been collecting songs since the '90s, so the list has grown into a mix of classic rock, blues, soul, reggae, country, and whatever else feels good to play. We don't always stick to the original genre either — our version of "Take Me Home, Country Roads" leans reggae, and a few other songs get bent into different feels depending on the night.
